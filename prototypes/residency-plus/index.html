<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>RESIDENCY+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --text: #f8fbff;
      --muted: rgba(210, 226, 255, .78);
      --line: rgba(170, 230, 255, 0.22);
      --cyan: #6ee7ff;
      --blue: #3b82f6;
      --purple: #8b5cf6;
      --bg0: #000;
      --bg1: #021428;
      --r1: 34px;
      --r2: 26px;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% -20%, rgba(110, 231, 255, .35), transparent 55%),
        radial-gradient(circle at 15% 0, rgba(59, 130, 246, .28), transparent 52%),
        radial-gradient(circle at 85% 0, rgba(139, 92, 246, .28), transparent 55%),
        linear-gradient(180deg, var(--bg1) 0, #00060e 55%, var(--bg0) 100%);
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 34px 14px 60px;
    }

    body[data-theme="dark"] {
      background:
        radial-gradient(circle at 20% 0, rgba(139, 92, 246, .14), transparent 55%),
        radial-gradient(circle at 80% 0, rgba(59, 130, 246, .10), transparent 55%),
        radial-gradient(circle at 50% -20%, rgba(255, 255, 255, .06), transparent 60%),
        linear-gradient(180deg, #000 0, #000 55%, #000 100%);
    }

    #bg-canvas,
    #droplet-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: .85;
    }

    #bg-canvas {
      z-index: 0;
    }

    #droplet-canvas {
      z-index: 1;
    }

    .page {
      width: 100%;
      max-width: 1120px;
      position: relative;
      z-index: 2;
    }

    .shell {
      position: relative;
      border-radius: var(--r1);
      padding: 18px;
      background:
        radial-gradient(circle at 50% -30%, rgba(110, 231, 255, .55), transparent 60%),
        linear-gradient(180deg, rgba(12, 42, 78, .92), rgba(2, 10, 26, .93));
      border: 1px solid var(--line);
      box-shadow: 0 26px 80px rgba(0, 0, 0, .72), 0 0 0 1px rgba(0, 0, 0, .65);
      overflow: hidden;
      backdrop-filter: blur(18px);
    }

    body[data-theme="dark"] .shell {
      background:
        radial-gradient(circle at 50% -30%, rgba(139, 92, 246, .20), transparent 60%),
        linear-gradient(180deg, rgba(10, 10, 20, .90), rgba(0, 0, 0, .94));
      border-color: rgba(255, 255, 255, .10);
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(from 180deg,
          rgba(110, 231, 255, 0),
          rgba(110, 231, 255, .20),
          rgba(139, 92, 246, 0),
          rgba(255, 255, 255, .10),
          rgba(110, 231, 255, 0));
      filter: blur(32px);
      opacity: .18;
      animation: spin 28s linear infinite;
      z-index: -1;
    }

    body[data-theme="dark"] .shell::before {
      opacity: .10;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 6px 18px;
      border-bottom: 1px solid rgba(170, 230, 255, .14);
      margin-bottom: 14px;
    }

    body[data-theme="dark"] .hero {
      border-bottom-color: rgba(255, 255, 255, .10);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 240px;
    }

    .logo {
      width: 46px;
      height: 46px;
      border-radius: 20px;
      background: radial-gradient(circle at 20% 0, #e8fbff, var(--cyan) 42%, var(--blue) 95%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #001023;
      font-weight: 900;
      box-shadow: 0 16px 38px rgba(60, 217, 255, .55);
      user-select: none;
      flex: 0 0 auto;
    }

    body[data-theme="dark"] .logo {
      background: radial-gradient(circle at 20% 0, #fff, rgba(139, 92, 246, .85) 55%, rgba(59, 130, 246, .85) 95%);
      box-shadow: 0 16px 38px rgba(139, 92, 246, .35);
    }

    .title {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      font-weight: 780;
      line-height: 1.02;
    }

    .sub {
      margin: 4px 0 0;
      font-size: .78rem;
      color: rgba(210, 226, 255, .72);
      letter-spacing: .10em;
      text-transform: uppercase;
    }

    .mini {
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(210, 226, 255, .75);
      white-space: nowrap;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .09), rgba(255, 255, 255, .03));
      border: 1px solid rgba(170, 230, 255, .18);
      box-shadow: 0 14px 36px rgba(0, 0, 0, .45);
      margin-bottom: 14px;
    }

    body[data-theme="dark"] .topbar {
      border-color: rgba(255, 255, 255, .12);
      background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .02));
    }

    .left,
    .right {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .field select,
    .field input {
      border-radius: 999px;
      border: 1px solid rgba(170, 230, 255, .18);
      background: rgba(2, 10, 24, .28);
      color: rgba(240, 250, 255, .95);
      outline: none;
      padding: 10px 12px;
      font-size: .82rem;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .035);
    }

    body[data-theme="dark"] .field select,
    body[data-theme="dark"] .field input {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .30);
    }

    .btnPrimary {
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      cursor: pointer;
      font-weight: 850;
      letter-spacing: .02em;
      color: #001023;
      background: linear-gradient(135deg, rgba(110, 231, 255, .95), rgba(139, 92, 246, .85));
      box-shadow: 0 14px 34px rgba(60, 217, 255, .42);
      transition: .12s ease;
      white-space: nowrap;
    }

    body[data-theme="dark"] .btnPrimary {
      color: #070312;
      background: linear-gradient(135deg, rgba(139, 92, 246, .95), rgba(59, 130, 246, .82));
      box-shadow: 0 14px 34px rgba(139, 92, 246, .30);
    }

    .btnPrimary:hover {
      transform: translateY(-1px);
    }

    .btn {
      border: 1px solid rgba(170, 230, 255, .20);
      background: rgba(2, 10, 24, .30);
      color: rgba(240, 250, 255, .9);
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      transition: .12s ease;
      white-space: nowrap;
    }

    body[data-theme="dark"] .btn {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .28);
    }

    .btn:disabled {
      opacity: .55;
      cursor: default;
    }

    .btn:hover:not(:disabled) {
      background: rgba(2, 10, 24, .50);
      border-color: rgba(170, 230, 255, .30);
    }

    body[data-theme="dark"] .btn:hover:not(:disabled) {
      background: rgba(0, 0, 0, .40);
      border-color: rgba(255, 255, 255, .18);
    }

    .dots {
      width: 44px;
      display: flex;
      justify-content: center;
      font-size: 1.1rem;
      padding: 8px 0;
    }

    .lineMsg {
      margin: 8px 2px 0;
      min-height: 18px;
    }

    .error {
      color: #fecaca;
      font-size: .8rem;
      display: none;
      white-space: pre-wrap;
    }

    .ok {
      color: #bbf7d0;
      font-size: .8rem;
      display: none;
      white-space: pre-wrap;
    }

    .mainGrid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(0, 1.2fr);
      gap: 14px;
      align-items: stretch;
    }

    @media (max-width: 980px) {
      .mainGrid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .card {
      border-radius: var(--r2);
      border: 1px solid rgba(170, 230, 255, .22);
      background:
        radial-gradient(circle at 0 0, rgba(110, 231, 255, .18), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, .16), transparent 60%),
        linear-gradient(180deg, rgba(8, 22, 46, .86), rgba(2, 10, 26, .92));
      box-shadow: 0 18px 60px rgba(0, 0, 0, .52);
      padding: 12px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    body[data-theme="dark"] .card {
      border-color: rgba(255, 255, 255, .12);
      background:
        radial-gradient(circle at 0 0, rgba(139, 92, 246, .12), transparent 60%),
        radial-gradient(circle at 100% 100%, rgba(59, 130, 246, .08), transparent 60%),
        linear-gradient(180deg, rgba(6, 6, 10, .88), rgba(0, 0, 0, .94));
    }

    .playerTop {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .now {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #4ade80;
      box-shadow: 0 0 12px rgba(74, 222, 128, .75);
      flex: 0 0 auto;
      margin-top: 6px;
    }

    .trackBlock {
      min-width: 0;
    }

    .trackTitle {
      font-weight: 850;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 560px;
      font-size: .98rem;
    }

    .metaLine {
      margin-top: 6px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      min-height: 24px;
    }

    .pill {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(170, 230, 255, .18);
      background: rgba(2, 10, 24, .22);
      white-space: nowrap;
      font-size: .72rem;
      letter-spacing: .04em;
      color: rgba(230, 245, 255, .92);
    }

    .pill.hidden {
      display: none;
    }

    body[data-theme="dark"] .pill {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .20);
    }

    .embed {
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(170, 230, 255, .30);
      background: radial-gradient(circle at top, rgba(12, 40, 84, .9), rgba(2, 10, 24, .95));
      position: relative;
    }

    body[data-theme="dark"] .embed {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .32);
    }

    iframe {
      display: block;
      width: 100%;
      height: 220px;
      border: 0;
    }

    @media (max-width: 980px) {
      iframe {
        height: 200px;
      }
    }

    /* ===== Mobile (≤640px) ===== */
    @media (max-width: 640px) {
      body {
        padding: 14px 8px 40px;
      }

      .shell {
        padding: 12px 10px;
        border-radius: 22px;
      }

      /* Brand: allow shrink, prevent overflow */
      .brand {
        min-width: 0;
        flex: 1 1 auto;
      }

      .title {
        font-size: 1.15rem;
        letter-spacing: .12em;
      }

      /* Allow mini labels to wrap on very narrow screens */
      .mini {
        white-space: normal;
      }

      /* Topbar: stack left/right groups on very small screens */
      .topbar {
        padding: 8px 10px;
        border-radius: 18px;
      }

      .left,
      .right {
        width: 100%;
        justify-content: flex-start;
      }

      /* All buttons: ensure 44px min tap target */
      .btn,
      .btnPrimary {
        min-height: 44px;
      }

      .miniBtn {
        min-height: 36px;
        padding: 6px 12px;
      }

      /* Track title: uncap width */
      .trackTitle {
        max-width: 100%;
        font-size: .92rem;
      }

      /* Reduce iframe on mobile */
      iframe {
        height: 175px;
      }

      /* Arrows: wider tap target */
      .ar {
        width: 40px;
        height: 80px;
      }

      /* Quick-action strip: left-align, full-width buttons */
      .quickActs {
        justify-content: stretch;
        gap: 8px;
        padding: 10px 6px 6px;
      }

      .quickActs .btn {
        flex: 1;
        min-height: 44px;
        text-align: center;
      }

      /* Crate/history list: shorter on mobile to avoid over-scroll */
      .list {
        max-height: 220px;
      }

      /* Row wrapping in drawer */
      .row {
        gap: 8px;
      }

      /* Reduce card padding */
      .card {
        padding: 10px 8px;
      }
    }

    .ar {
      position: absolute;
      top: 58%;
      transform: translateY(-50%);
      width: 34px;
      height: 70px;
      border-radius: 16px;
      border: 1px solid rgba(170, 230, 255, .22);
      background: rgba(2, 10, 24, .30);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(230, 245, 255, .9);
      cursor: pointer;
      user-select: none;
      z-index: 2;
      backdrop-filter: blur(10px);
    }

    body[data-theme="dark"] .ar {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .24);
    }

    .ar:hover {
      background: rgba(2, 10, 24, .52);
    }

    body[data-theme="dark"] .ar:hover {
      background: rgba(0, 0, 0, .40);
    }

    .ar.l {
      left: 8px;
    }

    .ar.r {
      right: 8px;
    }

    .drawer {
      margin-top: 12px;
      border-radius: 22px;
      border: 1px solid rgba(170, 230, 255, .18);
      background: rgba(2, 10, 24, .25);
      overflow: hidden;
    }

    body[data-theme="dark"] .drawer {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .22);
    }

    .drawerHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
    }

    .drawerTitle {
      font-weight: 850;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: .76rem;
      color: rgba(240, 250, 255, .92);
    }

    .drawerBody {
      padding: 10px 12px 12px;
      border-top: 1px solid rgba(170, 230, 255, .12);
      display: none;
    }

    body[data-theme="dark"] .drawerBody {
      border-top-color: rgba(255, 255, 255, .10);
    }

    .drawerBody.open {
      display: block;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    .rangeWrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(170, 230, 255, .16);
      background: rgba(2, 10, 24, .18);
    }

    body[data-theme="dark"] .rangeWrap {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .18);
    }

    .rangeWrap label {
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(210, 226, 255, .65);
      user-select: none;
    }

    input[type="range"] {
      width: 150px;
    }

    .toggleWrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(170, 230, 255, .16);
      background: rgba(2, 10, 24, .18);
    }

    body[data-theme="dark"] .toggleWrap {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .18);
    }

    .toggleWrap span {
      font-size: .72rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(210, 226, 255, .65);
      user-select: none;
    }

    .panelHead {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .panelHead strong {
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: .78rem;
      color: rgba(240, 250, 255, .92);
    }

    .miniBtn {
      border: none;
      background: rgba(2, 10, 24, .18);
      color: rgba(210, 226, 255, .78);
      cursor: pointer;
      font-size: .78rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(170, 230, 255, .16);
    }

    body[data-theme="dark"] .miniBtn {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .18);
    }

    .miniBtn:hover {
      background: rgba(2, 10, 24, .40);
      color: rgba(240, 250, 255, .95);
      border-color: rgba(170, 230, 255, .26);
    }

    body[data-theme="dark"] .miniBtn:hover {
      background: rgba(0, 0, 0, .36);
      border-color: rgba(255, 255, 255, .18);
    }

    .list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 320px;
      overflow: auto;
    }

    .empty {
      color: rgba(210, 226, 255, .55);
      font-style: italic;
      font-size: .8rem;
      padding: 8px 6px;
    }

    .panelCount {
      font-size: .72rem;
      color: rgba(170, 210, 255, .60);
      font-variant-numeric: tabular-nums;
      margin-left: 4px;
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(170, 230, 255, .22);
      background: rgba(2, 10, 24, .28);
      box-shadow: 0 10px 22px rgba(0, 0, 0, .38);
    }

    body[data-theme="dark"] .item {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .22);
    }

    .info {
      display: flex;
      gap: 10px;
      align-items: center;
      min-width: 0;
    }

    .bubble {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(240, 250, 255, .9);
      box-shadow: 0 0 8px rgba(240, 250, 255, .45);
      flex: 0 0 auto;
      opacity: .9;
    }

    .txt {
      min-width: 0;
    }

    .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: .82rem;
      color: rgba(240, 250, 255, .95);
    }

    .meta {
      font-size: .7rem;
      color: rgba(210, 226, 255, .70);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .acts {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .icon {
      border: none;
      background: rgba(2, 10, 24, .22);
      border: 1px solid rgba(170, 230, 255, .16);
      color: rgba(240, 250, 255, .9);
      border-radius: 999px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: .78rem;
      white-space: nowrap;
    }

    body[data-theme="dark"] .icon {
      border-color: rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .18);
    }

    .icon:hover {
      background: rgba(2, 10, 24, .48);
      border-color: rgba(170, 230, 255, .26);
    }

    body[data-theme="dark"] .icon:hover {
      background: rgba(0, 0, 0, .36);
      border-color: rgba(255, 255, 255, .18);
    }

    /* Loading spinner for progressLine */
    .spinning::after {
      content: "";
      display: inline-block;
      width: 9px;
      height: 9px;
      margin-left: 6px;
      border: 1.5px solid rgba(110, 231, 255, .35);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Friendly error/info bar improvements */
    .error {
      border-left: 3px solid #ef4444;
    }

    .ok {
      border-left: 3px solid #22c55e;
    }

    /* ===== Quick action strip (always-visible) ===== */
    .quickActs {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      padding: 8px 12px 4px;
    }

    .quickActs .btn {
      font-size: .76rem;
      padding: 5px 12px;
    }

    .trackLoading {
      opacity: .45;
      font-style: italic;
    }
  </style>
</head>

<body data-theme="aqua">
  <canvas id="bg-canvas"></canvas>
  <canvas id="droplet-canvas"></canvas>

  <div class="page">
    <div class="shell">
      <div class="hero">
        <div class="brand">
          <div class="logo">R</div>
          <div>
            <h1 class="title">RESIDENCY+</h1>
            <div class="sub" id="modeLabel">All • Tracks + Sets</div>
          </div>
        </div>
        <div class="mini" id="statusMini">READY</div>
      </div>

      <div class="topbar">
        <div class="left">
          <div class="field">
            <select id="genreSelect" title="Genre">
              <option value="all" selected>All</option>
              <optgroup label="Core">
                <option value="leftfield">Leftfield</option>

    function idbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbGet(key) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, "readonly");
        const store = tx.objectStore(DB_STORE);
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ?? null);
        req.onerror = () => reject(req.error);
        tx.oncomplete = () => db.close();
      });
    }
    async function idbSet(key, value) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(DB_STORE, "readwrite");
        const store = tx.objectStore(DB_STORE);
        const req = store.put(value, key);
        req.onsuccess = () => resolve(true);
        req.onerror = () => reject(req.error);
        tx.oncomplete = () => db.close();
      });
    }

    // ===== Formatting helpers =====

      const h = Math.floor(m / 60);
      if (h > 0) return `${h}h ${m % 60}m`;
      return `${m}:${String(s % 60).padStart(2, "0")}`;

    function fmtNum(n) {

      const num = Number(n);
      if (num >= 1_000_000) return `${(num / 1_000_000).toFixed(1)}M`;
      if (num >= 1_000) return `${(num / 1_000).toFixed(1)}k`;

    function normalizeUrl(u) {

      let s = String(u).trim();

      while (s.endsWith("/")) s = s.slice(0, -1);

    function fmtMs(ms) {
      const n = Math.max(0, Number(ms || 0));
      if (!n) return "—";
      const total = Math.floor(n / 1000);
      const m = Math.floor(total / 60);
      const s = total % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }
    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "—";
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const da = String(d.getDate()).padStart(2, "0");
      return `${y}-${mo}-${da}`;
    }
    function fmtNum(n) {
      const x = Number(n || 0);
      if (!Number.isFinite(x)) return "0";
      if (x >= 1e6) return (x / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
      if (x >= 1e3) return (x / 1e3).toFixed(1).replace(/\.0$/, "") + "K";
      return String(Math.round(x));
    }

    function parseBpmFromText(text) {
      const t = (text || "").toLowerCase();
      const m1 = t.match(/(?:^|[\s\[\(\-])(\d{2,3})\s*bpm\b/);
      const m2 = t.match(/\bbpm\s*(\d{2,3})\b/);
      const n = Number((m1?.[1] || m2?.[1] || 0));
      if (!Number.isFinite(n)) return "";
      if (n < 60 || n > 200) return "";
      return String(Math.round(n));
    }
    function parseKeyFromText(text) {
      const t = (text || "").toLowerCase().replace(/_/g, " ");
      const sharpFlat = /([a-g])\s*([#b])\s*(major|minor)\b/;
      const wordKey = /\b([a-g])\s*(major|minor)\b/;
      const shortKey = /\b([a-g])\s*([#b])?\s*(m|maj|min)\b/;

      let m = t.match(sharpFlat);
      if (m) return `${m[1].toUpperCase()}${m[2]} ${m[3]}`;
      m = t.match(wordKey);
      if (m) return `${m[1].toUpperCase()} ${m[2]}`;
      m = t.match(shortKey);
      if (m) {
        const note = m[1].toUpperCase() + (m[2] || "");
        const qual = m[3];
        if (qual === "m" || qual === "min") return `${note} minor`;
        if (qual === "maj") return `${note} major`;
      }
      return "";
    }

    function isDubstepish(blob) {
      return DUBSTEP_BLOCK.some(w => blob.includes(w));
    }
    function isDancehallish(blob) {
      return DANCEHALL_POS.some(w => blob.includes(w));
    }

    // If the user picked a bucket, we keep it as canonical BUT we still hard-block obvious wrong content.
    function bucketPass(bucket, blob) {
      if (bucket === "dancehall") {
        // hard block: any dubstep/bass indicators => reject even if it says riddim
        if (isDubstepish(blob) && !isDancehallish(blob)) return false;
        if (isDubstepish(blob) && blob.includes("dubstep")) return false;
        return true;
      }
      if (bucket === "dubstep") {
        // ensure it's actually dubstep-ish
        return isDubstepish(blob) || blob.includes("dubstep") || blob.includes("140");
      }
      return true;
    }

    async function scSearch(q, kind = "tracks", limit = 80) {
      if (Date.now() - lastReqAt < 600) return { collection: [] };

      if (activeController) activeController.abort();
      activeController = new AbortController();

      const url = `/.netlify/functions/sc-official-search?q=${encodeURIComponent(q)}&kind=${encodeURIComponent(kind)}&limit=${encodeURIComponent(limit)}`;
      try {
        const r = await fetch(url, { cache: "no-store", signal: activeController.signal });
        const text = await r.text();
        if (!r.ok) throw new Error(text || `HTTP ${r.status}`);
        return JSON.parse(text);
      } catch (err) {
        if (err.name === "AbortError") return { collection: [] };
        throw err;
      }
    }

    let stations = [];
    let stationId = "__all__";
    let playedMap = {};
    let playedSet = new Set();

    // anti-skip / anti-double-shuffle
    let shuffleInFlight = false;
    let pendingShuffle = false;

    // ===== Stats (fixed) =====
    function applyStatsPills(item) {
      const on = !!statsToggle.checked;

      pillPlays.classList.add("hidden");
      pillLikes.classList.add("hidden");
      pillComms.classList.add("hidden");

      if (!on || !item) return;

      const plays = item?.plays;
      const likes = item?.likes;
      const comments = item?.comments;

      if (plays != null) { pillPlays.classList.remove("hidden"); pillPlays.textContent = `Plays: ${fmtNum(plays)}`; }
      if (likes != null) { pillLikes.classList.remove("hidden"); pillLikes.textContent = `Likes: ${fmtNum(likes)}`; }
      if (comments != null) { pillComms.classList.remove("hidden"); pillComms.textContent = `Comments: ${fmtNum(comments)}`; }
    }

    // ===== No repeats per context =====
    function contextKey() {
      const g = genreSelect.value;
      const s = sourceSelect.value;
      const st = stationId || "__all__";
      return `g:${g}|s:${s}|st:${st}`;
    }
    function loadPlayedForContext() {
      const key = contextKey();
      const arr = Array.isArray(playedMap[key]) ? playedMap[key] : [];
      playedSet = new Set(arr);
    }
    function savePlayedUrl(url) {
      if (!url) return;
      const key = contextKey();
      const arr = Array.isArray(playedMap[key]) ? playedMap[key] : [];
      if (!arr.includes(url)) arr.push(url);
      if (arr.length > 14000) arr.splice(0, arr.length - 14000);
      playedMap[key] = arr;
      playedSet.add(url);
      saveJsonLS(STORAGE_KEY_PLAYEDMAP, playedMap);
    }
    function clearPlayedAll() {
      playedMap = {};
      playedSet = new Set();
      saveJsonLS(STORAGE_KEY_PLAYEDMAP, playedMap);
    }

    // ===== Stations (kept, no extra Netlify functions) =====
    function stationById(id) { return stations.find(x => x.id === id) || null; }
    function currentStation() { return (!stationId || stationId === "__all__") ? null : stationById(stationId); }
    function stationName(st) {
      if (!st) return "Station: Off";
      const a = safeShortName(st.seedArtist || "", 14);
      const b = safeShortName(st.bucket || "", 12);
      return st.name || `${a || "Station"}${b ? " • " + b : ""}`;
    }
    function renderStationsSelect() {
      stationSelect.innerHTML = "";
      const opt0 = document.createElement("option");
      opt0.value = "__all__";
      opt0.textContent = "Station: Off";
      stationSelect.appendChild(opt0);
      for (const st of stations.slice().sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""))) {
        const opt = document.createElement("option");
        opt.value = st.id;
        opt.textContent = "Station: " + stationName(st);
        stationSelect.appendChild(opt);
      }
      stationSelect.value = stationId || "__all__";
    }

    function stationMatchScore(item, st) {
      let score = 0;
      const artist = (item.artist || "").toLowerCase();
      if (st.seedArtist && artist && artist.includes(st.seedArtist.toLowerCase())) score += 65;

      const b = (item.bucket || "").toLowerCase();
      if (st.bucket && b === st.bucket.toLowerCase()) score += 35;

      const tagsA = new Set((item.tags || []).map(x => String(x).toLowerCase()));
      const tagsB = new Set((st.tags || []).map(x => String(x).toLowerCase()));
      let overlap = 0;
      for (const t of tagsB) { if (tagsA.has(t)) overlap++; }
      score += Math.min(40, overlap * 8);

      return score;
    }

    const crateCount = document.getElementById("crateCount");
    const historyCount = document.getElementById("historyCount");
    const copyCrateBtn = document.getElementById("copyCrateBtn");
    const exportCrateBtn = document.getElementById("exportCrateBtn");

    // ===== List rendering =====
    function renderList(el, arr, type) {
      el.innerHTML = "";
      // Update count badge
      if (type === "crate" && crateCount) crateCount.textContent = arr.length ? `${arr.length}` : "";
      if (type === "history" && historyCount) historyCount.textContent = arr.length ? `${arr.length}` : "";
      // Update crate action buttons
      if (type === "crate") {
        if (copyCrateBtn) copyCrateBtn.disabled = arr.length === 0;
        if (exportCrateBtn) exportCrateBtn.disabled = arr.length === 0;
      }
      if (!arr.length) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = type === "crate" ? "No saved tracks yet — hit Save on a track you like."
          : type === "history" ? "No history yet — start shuffling."
            : "—";
        el.appendChild(d);
        return;
      }
      arr.forEach((item, idx) => {
        const li = document.createElement("li");
        li.className = "item";

        const info = document.createElement("div");
        info.className = "info";

        const bubble = document.createElement("div");
        bubble.className = "bubble";

        const txt = document.createElement("div");
        txt.className = "txt";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = item.title || item.url || "Untitled";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = [item.kind, item.artist, item.bucket].filter(Boolean).join(" · ");

        txt.appendChild(name);
        txt.appendChild(meta);
        info.appendChild(bubble);
        info.appendChild(txt);

        const acts = document.createElement("div");
        acts.className = "acts";

        const play = document.createElement("button");
        play.className = "icon";
        play.textContent = "Play";
        play.onclick = () => loadItem(item, true);

        const open = document.createElement("button");
        open.className = "icon";
        open.textContent = "↗";
        open.onclick = () => item.url && window.open(item.url, "_blank");

        acts.appendChild(play);
        acts.appendChild(open);

        if (type === "crate") {
          const remove = document.createElement("button");
          remove.className = "icon";
          remove.textContent = "✕";
          remove.onclick = () => {
            crate.splice(idx, 1);
            saveJsonLS(STORAGE_KEY_CRATE, crate);
            renderList(crateList, crate, "crate");
          };
          acts.appendChild(remove);
        }

        if (type === "history") {
          const saveHist = document.createElement("button");
          saveHist.className = "icon";
          const alreadySaved = () => crate.some(x => x.url === item.url);
          saveHist.textContent = alreadySaved() ? "✓" : "Save";
          saveHist.title = alreadySaved() ? "Already in crate" : "Save to crate";
          saveHist.onclick = () => {
            if (alreadySaved()) {
              saveHist.textContent = "✓";
              return;
            }
            crate.push(item);
            saveJsonLS(STORAGE_KEY_CRATE, crate);
            if (typeof debouncedCrateSync === "function") debouncedCrateSync();
            renderList(crateList, crate, "crate");
            saveHist.textContent = "✓";
            saveHist.title = "Saved";
          };
          acts.appendChild(saveHist);
        }

        li.appendChild(info);
        li.appendChild(acts);
        el.appendChild(li);
      });
    }

    function addToHistory(item) {
      if (!item?.url) return;
      if (history.length && history[0].url === item.url) return;
      history.unshift(item);
      if (history.length > 250) history = history.slice(0, 250);
      saveJsonLS(STORAGE_KEY_HISTORY, history);
      if (typeof debouncedHistorySync === "function") debouncedHistorySync();
      renderList(historyList, history, "history");
    }

    // ===== Scoring / selection =====
    function computeDigScore(it) {
      const plays = Number(it?.playback_count ?? it?.play_count ?? it?.plays ?? 0) || 0;
      const likes = Number(it?.favoritings_count ?? it?.likes_count ?? it?.likes ?? 0) || 0;
      const comms = Number(it?.comment_count ?? it?.comments ?? 0) || 0;
      const reps = Number(it?.reposts_count ?? 0) || 0;

      const engagement = (likes * 1.6 + comms * 2.2 + reps * 2.5) / Math.max(plays, 40);
      const sizePenalty = Math.log10(plays + 10) * 0.10;

      let recency = 0;
      const created = it?.created_at ? new Date(it.created_at).getTime() : 0;
      if (created && Number.isFinite(created)) {
        const days = Math.max(0, (Date.now() - created) / (1000 * 60 * 60 * 24));
        recency = Math.max(0, 1 - days / 365) * 0.18;
      }
      const score = (engagement * 100) + (recency * 100) - (sizePenalty * 12);
      return Math.round(Math.max(0, Math.min(100, score)));
    }

    function contextPickPool(matches) {
      const sorted = matches.slice().sort((a, b) => (b._score ?? 50) - (a._score ?? 50));
      const digBias = Number(obscureRange.value) / 100;

      const baseTake = Math.max(50, Math.floor(sorted.length * 0.45));
      const tightTake = Math.max(25, Math.floor(sorted.length * 0.18));
      const topN = Math.round(baseTake - (baseTake - tightTake) * digBias);

      return sorted.slice(0, Math.min(topN, sorted.length));
    }

    // ===== Core: library add (bucket-first) =====
    function pushUnique(item) {
      const url = normalizeUrl(item?.url || "");
      if (!url) return false;
      for (const x of library) { if (x.url === url) return false; }
      library.push({ ...item, url });
      return true;
    }

    function addLibraryItemFromSearchResult(it, forcedBucket) {
      const permalink = normalizeUrl(it?.permalink_url || "");
      if (!permalink || !permalink.startsWith("http")) return false;

      const blob = blobFor(it);
      if (isJunkText(blob)) return false;

      // hard rules by bucket (dancehall vs dubstep)
      if (!bucketPass(forcedBucket, blob)) return false;

      const durationMs = Number(it?.duration || 0);
      const kind = classifyKindFromDuration(durationMs);

      const mode = sourceSelect?.value || "both";
      if (!isAllowedByMode(kind, durationMs, mode)) return false;

      const title = it?.title || it?.name || "";
      const user = it?.user?.username || "";

      const tags = scTagListToArray(it?.tag_list || "")
        .filter(t => !t.includes("type") && !t.includes("free") && !t.includes("beat"));

      const blobForGuess = `${title} ${it?.tag_list || ""} ${user} ${it?.genre || ""}`;
      const bpmGuess = parseBpmFromText(blobForGuess);
      const keyGuess = parseKeyFromText(blobForGuess);

      const item = {
        kind,
        title,
        artist: user,
        url: permalink,
        bucket: forcedBucket || "other",
        tags: Array.from(new Set([...(tags || [])])).slice(0, 35),
        durationMs,
        uploadedAt: it?.created_at || "",
        bpmGuess,
        keyGuess,
        plays: it?.playback_count ?? null,
        likes: it?.favoritings_count ?? null,
        comments: it?.comment_count ?? null,
        _score: computeDigScore(it)
      };
      return pushUnique(item);
    }

    // ===== Filtering (bucket-based, fixes genre separation) =====
    function getFilteredLibrary() {
      const bucket = genreSelect.value;
      const mode = sourceSelect.value;
      const st = currentStation();

      const out = [];
      for (const t of library) {
        if (!t?.url) continue;

        const kind = t.kind || "track";
        if (mode !== "both" && kind !== mode) continue;

        const b = (t.bucket || "other").toLowerCase();
        if (bucket !== "all" && b !== bucket) continue;

        const d = Number(t.durationMs || 0);
        if (!isAllowedByMode(kind, d, mode)) continue;

        if (localSearch) {
          const blob = `${t.title || ""} ${t.artist || ""} ${(t.tags || []).join(" ")} ${t.bucket || ""}`.toLowerCase();
          if (!blob.includes(localSearch)) continue;
        }

        if (st) {
          const score = stationMatchScore(t, st);
          if (score < 18) continue;
          out.push({ ...t, _stationScore: score });
        } else {
          out.push(t);
        }
      }

      if (st) {
        out.sort((a, b) => (b._stationScore || 0) - (a._stationScore || 0) || ((b._score || 50) - (a._score || 50)));
      }
      return out;
    }

    function updateModeLabel() {
      const b = genreSelect.value;
      const mode = sourceSelect.value;
      const st = currentStation();
      const parts = [];
      parts.push(st ? stationName(st) : (b === "all" ? "All" : b));
      parts.push(mode === "both" ? "Tracks + Sets" : (mode === "track" ? "Tracks ≤ 6:00" : "Sets ≥ 10:00"));
      parts.push(`dig${obscureRange.value}`);
      modeLabel.textContent = parts.join(" • ");
      miniNow.textContent = stationId === "__all__" ? "—" : "station on";
    }

    function resetContext() {
      loadPlayedForContext();
      updateModeLabel();
    }

    function getUnplayedOrReset(matches) {
      let unplayed = matches.filter(t => !playedSet.has(t.url));
      if (!unplayed.length) {
        const key = contextKey();
        playedMap[key] = [];
        saveJsonLS(STORAGE_KEY_PLAYEDMAP, playedMap);
        playedSet = new Set();
        unplayed = matches.slice();
      }
      return unplayed;
    }

    // ===== Auto-dig (automatic per filter) =====
    const DIG_TOKENS = ["dub", "version", "edit", "refix", "bootleg", "flip", "vip", "white label", "test press", "promo", "unreleased", "demo", "instrumental", "acapella", "rough", "tape", "archive", "b-side", "tool", "live take"];
    const GENRE_PACKS = {
      leftfield: ["deconstructed club", "outsider electronic", "broken beat", "abstract club", "leftfield"],
      dancehall: ["dancehall", "bashment", "jamaican riddim", "dubplate", "soundclash"],
      hiphop: ["underground rap", "alt rap", "rap loosie", "indie rap"],
      rnb: ["alt rnb", "neo soul", "future rnb", "rnb demo"],
      afrobeats: ["afrobeats", "amapiano", "afro fusion", "afro rhythms"],
      house: ["deep house", "minimal house", "house dub", "club tool"],
      techno: ["hypnotic techno", "warehouse techno", "techno tool", "techno dub"],
      dnb: ["drum and bass", "jungle", "liquid dnb", "rollers"],
      dubstep: ["dubstep", "140", "deep dubstep", "uk dubstep"],
      futuregarage: ["future garage", "2-step", "ambient garage", "uk bass"],
      ukg: ["uk garage", "2-step", "speed garage", "ukg"],
      breakbeat: ["breakbeat", "breaks", "acid breaks", "nu breaks"],
      bass: ["halftime", "bass music", "leftfield bass", "experimental bass"],
      trance: ["trance", "progressive trance", "hard trance", "uplifting trance"],
      electro: ["electro", "electro breaks", "electro tool"],
      idm: ["idm", "braindance", "glitch", "experimental electronic"],
      experimental: ["experimental", "outsider", "abstract electronic", "weird electronic"],
      reggae: ["roots reggae", "dub reggae", "reggae", "dub"],
      soca: ["soca", "carnival", "road march"],
      afrohouse: ["afro house", "tribal house", "afro deep"],
      brazil: ["baile funk", "funk br", "mandelao"],
      latin: ["reggaeton", "latin club", "perreo"],
      world: ["global beats", "world", "folk"],
      ambient: ["ambient", "drone", "soundscape", "field recording"],
      downtempo: ["downtempo", "trip hop", "leftfield chill"],
      lofi: ["tape", "lofi", "cassette", "beat tape"],
      soul: ["soul", "rare groove", "samples", "crate dig"],
      jazz: ["jazz", "spiritual jazz", "jazz fusion"],
      classical: ["modern classical", "neo classical", "minimal piano"],
      industrial: ["industrial", "ebm", "dark electro"],
      noise: ["noise", "harsh noise", "power electronics"],
      drone: ["drone", "dark drone", "ambient drone"],
      punk: ["punk", "post punk", "hardcore punk"],
      metal: ["metal", "black metal", "doom metal"],
      other: ["underground", "rare", "archive", "demo"]
    };

    function packKeyFor(bucket) {
      const x = (bucket || "").toLowerCase();
      return GENRE_PACKS[x] ? x : "other";
    }

    async function runPool(tasks, concurrency = 3) {
      const results = [];
      let i = 0;
      const workers = new Array(concurrency).fill(0).map(async () => {
        while (i < tasks.length) {
          const idx = i++;
          try { results[idx] = await tasks[idx](); } catch (e) { results[idx] = null; }
        }
      });
      await Promise.all(workers);
      return results;
    }

    // No intrusive “Loading…”: we keep status minimal and only show errors.
    async function quickFill(bucketValue, force = false) {
      const mode = sourceSelect.value;
      const bucket = (bucketValue === "all") ? "other" : bucketValue;
      const packKey = packKeyFor(bucket);
      const baseTerms = GENRE_PACKS[packKey] || GENRE_PACKS.other;

      const tA = DIG_TOKENS[Math.floor(Math.random() * DIG_TOKENS.length)];
      const tB = DIG_TOKENS[Math.floor(Math.random() * DIG_TOKENS.length)];
      const queries = [
        `${baseTerms[0]} ${tA}`,
        `${baseTerms[1] || baseTerms[0]} ${tB}`,
        `${baseTerms[2] || baseTerms[0]}`
      ];

      const wantTracks = (mode !== "set");
      const wantSets = (mode !== "track");

      const tasks = [];
      if (wantTracks) {
        for (const q of queries) {
          tasks.push(async () => ({ kind: "tracks", data: await scSearch(q, "tracks", 80), bucket: packKey }));
        }
      }
      if (wantSets) {
        for (const q of queries.slice(0, 2)) {
          tasks.push(async () => ({ kind: "playlists", data: await scSearch(q, "playlists", 70), bucket: packKey }));
        }
      }

      progressLine.classList.add("spinning");
      setProgress("digging…");
      const results = await runPool(tasks, 3);

      let added = 0;
      for (const r of results) {
        const collection = Array.isArray(r?.data?.collection) ? r.data.collection : [];
        // prefer better-scoring
        collection.sort((a, b) => computeDigScore(b) - computeDigScore(a));
        for (const it of collection.slice(0, 55)) {
          const ok = addLibraryItemFromSearchResult(it, r.bucket);
          if (ok) added++;
        }
      }
      if (added > 0) await idbSet(STORAGE_KEY_LIBRARY, library);
      setProgress("");
      progressLine.classList.remove("spinning");
      return added;
    }

    async function ensureMinPool() {
      const bucket = genreSelect.value;
      const minWanted = (bucket === "all") ? 70 : 28;

      let matches = getFilteredLibrary();
      if (matches.length >= minWanted) return true;

      // auto-dig automatically per filter:
      // do a couple quick fills if needed, without spamming UI
      for (let i = 0; i < 3; i++) {
        await quickFill(bucket, true);
        matches = getFilteredLibrary();
        if (matches.length >= minWanted) return true;
      }
      return matches.length > 0;
    }

    // ===== Load + resolve + stats reconciliation =====
    async function loadItem(item, autoplay = true) {
      if (!item?.url) return;

      currentItem = item;
      clearStatus();
      setStatus("PLAYING");

      const titleText = item.title || "—";
      trackTitleEl.textContent = titleText;
      trackTitleEl.title = titleText;   // tooltip for truncated titles
      trackTitleEl.classList.remove("trackLoading");

      // Populate miniNow with artist / bucket context
      const artist = item.artist ? item.artist : "";
      const bucket = item.bucket ? item.bucket : "";
      const meta = [artist, bucket].filter(Boolean).join(" · ");
      miniNow.textContent = meta || "Unknown";

      widgetLoad(item.url, autoplay);

      openBtn.disabled = false;
      saveBtn.disabled = false;
      makeStationBtn.disabled = false;
      openBtn.dataset.url = item.url;
      try { localStorage.setItem(STORAGE_KEY_LAST, JSON.stringify(item)); } catch { }

      setPill(pillKey, item.keyGuess ? `Key: ${item.keyGuess}` : null);
      setPill(pillBpm, item.bpmGuess ? `BPM: ${item.bpmGuess}` : null);
      setPill(pillLen, `Len: ${fmtMs(item.durationMs)}`);
      setPill(pillRel, `Uploaded: ${fmtDate(item.uploadedAt)}`);
      applyStatsPills(item, statsToggle.checked);

      addToHistory(item);
      savePlayedUrl(item.url);
      updateModeLabel();

      // Resolve in background: update duration + stats, and auto-skip if wrong bucket.
      try {
        const resolved = await scResolve(item.url);

        // Determine kind/duration (resolve gives best duration)
        const durationMs = Number(resolved?.duration || item.durationMs || 0);
        const kind = classifyKindFromDuration(durationMs);

        // robust stats fields
        const plays = resolved?.playback_count ?? resolved?.play_count ?? resolved?.plays ?? item.plays ?? null;
        const likes = resolved?.favoritings_count ?? resolved?.likes_count ?? resolved?.likes ?? item.likes ?? null;
        const comms = resolved?.comment_count ?? resolved?.comments ?? item.comments ?? null;

        // stronger bucket correctness check (especially dancehall vs dubstep)
        const rb = blobFor(resolved);
        const bucket = item.bucket || "other";
        if (!bucketPass(bucket, rb)) {
          // blacklist this URL in current context and immediately shuffle again (no annoying “loading”)
          savePlayedUrl(item.url);
          widgetPause();
          await sleep(120);
          doShuffle(true);
          return;
        }

        currentItem = {
          ...currentItem,
          durationMs,
          kind,
          uploadedAt: resolved?.created_at || currentItem.uploadedAt,
          plays,
          likes,
          comments: comms,
          bpmGuess: resolved?.bpm ? String(Math.round(Number(resolved.bpm))) : currentItem.bpmGuess
        };

        // Persist improvements
        const idx = library.findIndex(x => x.url === item.url);
        if (idx !== -1) {
          library[idx] = { ...library[idx], ...currentItem };
          await idbSet(STORAGE_KEY_LIBRARY, library);
        }

        // Enforce mode durations
        const mode = sourceSelect.value;
        if (!isAllowedByMode(kind, durationMs, mode)) {
          savePlayedUrl(item.url);
          widgetPause();
          await sleep(120);
          doShuffle(true);
          return;
        }

        setPill(pillLen, `Len: ${fmtMs(durationMs)}`);
        setPill(pillRel, `Uploaded: ${fmtDate(currentItem.uploadedAt)}`);
        setPill(pillBpm, currentItem.bpmGuess ? `BPM: ${currentItem.bpmGuess}` : null);
        applyStatsPills(currentItem, statsToggle.checked);
      } catch (e) {
        // don’t spam UI; only show if user explicitly asked for stats and nothing is working
        // (silent fail keeps creative flow)
      }
    }

    // ===== Export =====
    function downloadFile(filename, text) {
      const blob = new Blob([text], { type: "application/octet-stream" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    }

    function exportCrate() {
      if (!crate.length) return;
      const payload = {
        exportedAt: new Date().toISOString(),
        count: crate.length,
        tracks: crate.map(it => ({
          title: it.title || "",
          artist: it.artist || "",
          url: it.url || "",
          kind: it.kind || "",
          bucket: it.bucket || "",
          durationMs: it.durationMs || 0
        }))
      };
      downloadFile(`residency-crate-${Date.now()}.json`, JSON.stringify(payload, null, 2));
    }

    async function copyCrateUrls() {
      if (!crate.length) return;
      const text = crate.map(it => it.url).filter(Boolean).join("\n");
      try {
        await navigator.clipboard.writeText(text);
        showOk(`${crate.length} URL${crate.length > 1 ? "s" : ""} copied to clipboard.`);
        setTimeout(() => { okBox.style.display = "none"; }, 2200);
      } catch {
        showError("Clipboard access denied. Copy from browser console.");
      }
    }
    function downloadExport() {
      const payload = {
        exportedAt: new Date().toISOString(),
        stationsCount: stations.length,
        stations,
        libraryCount: library.length,
        savedCount: crate.length,
        historyCount: history.length,
        library, saved: crate, history
      };
      downloadFile(`residency-export-${Date.now()}.json`, JSON.stringify(payload, null, 2));
    }

    // ===== Shuffle core =====
    function pickAndPlay(matches) {
      const unplayed = getUnplayedOrReset(matches);
      const pool = contextPickPool(unplayed);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      loadItem(pick, true);
    }

    async function doShuffle(fromResolveSkip = false) {
      if (shuffleInFlight) {
        pendingShuffle = true;
        return;
      }
      shuffleInFlight = true;
      pendingShuffle = false;

      // Disable action buttons while request is in-flight
      shuffleBtn.disabled = true;
      nextArrow.style.pointerEvents = "none";
      shuffleBtn.textContent = "\u2026";

      // Show loading state on the track title
      trackTitleEl.textContent = "Finding\u2026";
      trackTitleEl.title = "";
      trackTitleEl.classList.add("trackLoading");
      miniNow.textContent = "";
      try {
        clearStatus();

        // Ensure pool is filled for current filter automatically
        const ok = await ensureMinPool();
        let matches = getFilteredLibrary();

        if (!ok || !matches.length) {
          const genre = genreSelect.value === "all" ? "" : ` for "${genreSelect.value}"`;
          showError(`No tracks found${genre}. Try a different genre or hit Auto-Dig to fill the library.`);
          setStatus("READY");
          return;
        }

        // station filter
        const st = currentStation();
        if (st) {
          // already sorted by station in getFilteredLibrary()
        }

        pickAndPlay(matches);
        setStatus("PLAYING");
      } catch (e) {
        showError(String(e?.message || e));
        setStatus("READY");
      } finally {
        shuffleInFlight = false;
        shuffleBtn.disabled = false;
        shuffleBtn.textContent = "Shuffle";
        nextArrow.style.pointerEvents = "";
        if (pendingShuffle) {
          pendingShuffle = false;
          setTimeout(() => doShuffle(false), 60);
        }
      }
    }

    function uuid() {
      return (crypto?.randomUUID?.() || ("st_" + Math.random().toString(16).slice(2) + Date.now()));
    }

    async function createStation() {
      if (!currentItem?.url) return;
      makeStationBtn.disabled = true;
      makeStationBtn.textContent = "…";
      try {
        const resolved = await scResolve(currentItem.url).catch(() => null);
        const title = (resolved?.title || currentItem?.title || "").toString();
        const artist = (resolved?.user?.username || currentItem?.artist || "").toString();
        const bucket = (currentItem?.bucket || genreSelect.value || "other");
        const tags = Array.from(new Set([
          ...scTagListToArray(resolved?.tag_list || ""),
          ...(currentItem?.tags || [])
        ])).filter(t => t.length >= 3 && !isJunkText(t)).slice(0, 10);

        const st = {
          id: uuid(),
          name: `${safeShortName(artist, 14)}${bucket ? " • " + safeShortName(bucket, 12) : ""}`.trim() || "Station",
          seedUrl: currentItem?.url,
          seedTitle: title,
          seedArtist: artist,
          bucket,
          tags,
          createdAt: new Date().toISOString()
        };

        const sig = `${(st.seedArtist || "").toLowerCase()}|${(st.bucket || "").toLowerCase()}`;
        const existing = stations.find(x => `${(x.seedArtist || "").toLowerCase()}|${(x.bucket || "").toLowerCase()}` === sig);
        if (existing) {
          stationId = existing.id;
        } else {
          stations.unshift(st);
          if (stations.length > 40) stations = stations.slice(0, 40);
          saveJsonLS(STORAGE_KEY_STATIONS, stations);
          stationId = st.id;
        }
        renderStationsSelect();
        resetContext();
        doShuffle(false);
      } catch (e) {
        showError(String(e?.message || e));
      } finally {
        makeStationBtn.disabled = false;
        makeStationBtn.textContent = "Station";
      }
    }

    function toggleDrawer(force) {
      const isOpen = drawerBody.classList.contains("open");
      const next = (typeof force === "boolean") ? force : !isOpen;
      drawerBody.classList.toggle("open", next);
      drawerHint.textContent = next ? "open" : "closed";
    }
    drawerHead.onclick = () => toggleDrawer();
    openDrawerBtn.onclick = () => toggleDrawer(true);

    let bgMode = "fish";
    function setTheme(theme) {
      document.body.setAttribute("data-theme", theme);
      try { localStorage.setItem(STORAGE_KEY_THEME, theme); } catch { }
      bgMode = theme === "dark" ? "stars" : "fish";
    }
    themeBtn.onclick = () => {
      const cur = document.body.getAttribute("data-theme") || "aqua";
      setTheme(cur === "dark" ? "aqua" : "dark");
    };

    function updateButtons() {
      makeStationBtn.disabled = !currentItem?.url;
      openBtn.disabled = !currentItem?.url;
      saveBtn.disabled = !currentItem?.url;
    }

    // ===== EVENTS =====
    const debouncedSearch = debounce(() => doShuffle(false), 300);
    const debouncedAutoDig = debounce(async () => {
      if (window.SC_OK === false) { showBanner("Missing SOUNDCLOUD_CLIENT_ID environment variable."); return; }
      autoDigBtn.disabled = true;
      autoDigBtn.textContent = "Digging…";
      progressLine.classList.add("spinning");
      try {
        await quickFill(genreSelect.value, true);
        await quickFill(genreSelect.value, true);
        doShuffle(false);
      } catch (e) {
        showError(String(e?.message || e));
      } finally {
        autoDigBtn.disabled = false;
        autoDigBtn.textContent = "Auto-Dig";
        progressLine.classList.remove("spinning");
      }
    }, 300);

    shuffleBtn.onclick = () => {
      if (window.SC_OK === false) { showBanner("Missing SOUNDCLOUD_CLIENT_ID environment variable."); return; }
      debouncedSearch();
    };
    nextArrow.onclick = () => {
      if (window.SC_OK === false) return;
      debouncedSearch();
    };
    prevArrow.onclick = () => { if (history.length >= 2) loadItem(history[1], true); };

    openBtn.onclick = () => openBtn.dataset.url && window.open(openBtn.dataset.url, "_blank");
    saveBtn.onclick = () => {
      if (!currentItem?.url) return;
      if (crate.some(x => x.url === currentItem.url)) {
        showOk("Already in your saved crate.");
        setTimeout(() => { okBox.style.display = "none"; }, 2000);
        return;
      }
      crate.push(currentItem);
      saveJsonLS(STORAGE_KEY_CRATE, crate);
      if (typeof debouncedCrateSync === "function") debouncedCrateSync();
      renderList(crateList, crate, "crate");
      showOk("Saved to crate.");
      setTimeout(() => { okBox.style.display = "none"; }, 1800);
    };
    clearCrate.onclick = () => { crate = []; saveJsonLS(STORAGE_KEY_CRATE, crate); renderList(crateList, crate, "crate"); };
    clearHistory.onclick = () => { history = []; saveJsonLS(STORAGE_KEY_HISTORY, history); renderList(historyList, history, "history"); };
    copyCrateBtn.onclick = () => copyCrateUrls();
    exportCrateBtn.onclick = () => exportCrate();

    autoDigBtn.onclick = debouncedAutoDig;

    exportBtn.onclick = downloadExport;

    genreSelect.onchange = () => {
      try { localStorage.setItem(STORAGE_KEY_GENRE, genreSelect.value); } catch { }
      if (typeof debouncedStateSync === "function") debouncedStateSync();
      resetContext(); doShuffle(false);
    };
    sourceSelect.onchange = () => {
      try { localStorage.setItem(STORAGE_KEY_SOURCE, sourceSelect.value); } catch { }
      if (typeof debouncedStateSync === "function") debouncedStateSync();
      resetContext(); doShuffle(false);
    };
    stationSelect.onchange = () => {
      stationId = stationSelect.value || "__all__";
      try { localStorage.setItem(STORAGE_KEY_STATION, stationId); } catch { }
      if (typeof debouncedStateSync === "function") debouncedStateSync();
      resetContext(); doShuffle(false);
    };
    makeStationBtn.onclick = createStation;

    clearStationsBtn.onclick = () => {
      stations = []; stationId = "__all__"; saveJsonLS(STORAGE_KEY_STATIONS, stations);
      renderStationsSelect(); resetContext();
    };
    clearRepeatsBtn.onclick = () => {
      clearPlayedAll(); resetContext();
    };

    obscureRange.oninput = () => {
      try { localStorage.setItem(STORAGE_KEY_RANGE, obscureRange.value); } catch { }
      if (typeof debouncedStateSync === "function") debouncedStateSync();
      updateModeLabel();
    };
    searchLocalEl.addEventListener("input", () => {
      localSearch = (searchLocalEl.value || "").trim().toLowerCase();
    });
    searchLocalEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        if (window.SC_OK === false) { showBanner("Missing SOUNDCLOUD_CLIENT_ID environment variable."); return; }
        debouncedSearch();
      }
    });

    statsToggle.onchange = () => {
      try { localStorage.setItem(STORAGE_KEY_STATS, statsToggle.checked ? "1" : "0"); } catch { }
      applyStatsPills(currentItem);
    };

    // ===== BACKGROUND ANIMATION =====
    const bgCanvas = document.getElementById("bg-canvas");
    const bg = bgCanvas.getContext("2d", { alpha: true });
    const dropletCanvas = document.getElementById("droplet-canvas");
    const ctx = dropletCanvas.getContext("2d", { alpha: true });

    let DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    let W = 0, H = 0;
    function resizeAll() {
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = Math.floor(window.innerWidth * DPR);
      H = Math.floor(window.innerHeight * DPR);
      bgCanvas.width = W; bgCanvas.height = H;
      dropletCanvas.width = W; dropletCanvas.height = H;
    }
    window.addEventListener("resize", resizeAll, { passive: true });

    const fishes = [];
    function spawnFish() {
      const y = (Math.random() * 0.85 + 0.08) * H;
      const dir = Math.random() < 0.5 ? 1 : -1;
      const x = dir === 1 ? -80 * DPR : W + 80 * DPR;
      fishes.push({
        x, y, dir,
        spd: (0.25 + Math.random() * 0.55) * DPR,
        size: (14 + Math.random() * 26) * DPR,
        wig: Math.random() * Math.PI * 2,
        hue: Math.random() < 0.5 ? "cyan" : "purple",
        a: 0.10 + Math.random() * 0.14
      });
      if (fishes.length > 18) fishes.shift();
    }
    const stars = [];
    function spawnStar() {
      const x = (Math.random() * 0.8 + 0.1) * W;
      const y = (Math.random() * 0.4 + 0.05) * H;
      const len = (140 + Math.random() * 240) * DPR;
      const spd = (10 + Math.random() * 14) * DPR;
      const ang = Math.PI * (0.78 + Math.random() * 0.18);
      stars.push({ x, y, len, spd, ang, life: 1 });
      if (stars.length > 14) stars.shift();
    }
    function drawFish(f) {
      bg.globalAlpha = f.a;
      const s = f.size;
      bg.beginPath();
      bg.ellipse(f.x, f.y, s * 1.25, s * 0.65, 0, 0, Math.PI * 2);
      bg.fillStyle = (f.hue === "cyan") ? "rgba(110,231,255,.55)" : "rgba(139,92,246,.48)";
      bg.fill();
      const tx = f.x - f.dir * (s * 1.35);
      bg.beginPath();
      bg.moveTo(tx, f.y);
      bg.lineTo(tx - f.dir * (s * 0.9), f.y - s * 0.6);
      bg.lineTo(tx - f.dir * (s * 0.9), f.y + s * 0.6);
      bg.closePath();
      bg.fillStyle = "rgba(255,255,255,.22)";
      bg.fill();
      bg.globalAlpha = 1;
    }
    function drawStar(st) {
      bg.globalAlpha = Math.max(0, st.life) * 0.55;
      const dx = Math.cos(st.ang), dy = Math.sin(st.ang);
      const x2 = st.x + dx * st.len;
      const y2 = st.y + dy * st.len;
      bg.lineWidth = 2.2 * DPR;
      bg.beginPath();
      bg.moveTo(st.x, st.y);
      bg.lineTo(x2, y2);
      bg.strokeStyle = "rgba(255,255,255,.55)";
      bg.stroke();
      bg.globalAlpha = 1;
    }
    let lastFish = 0, lastStar = 0;
    function animateBG(ts) {
      bg.clearRect(0, 0, W, H);
      if (bgMode === "fish") {
        if (ts - lastFish > 900) { lastFish = ts; spawnFish(); }
        for (let i = fishes.length - 1; i >= 0; i--) {
          const f = fishes[i];
          f.wig += 0.06;
          f.x += f.dir * f.spd;
          f.y += Math.sin(f.wig) * 0.15 * DPR;
          drawFish(f);
          if ((f.dir === 1 && f.x > W + 120 * DPR) || (f.dir === -1 && f.x < -120 * DPR)) fishes.splice(i, 1);
        }
      } else {
        if (ts - lastStar > 520) { lastStar = ts; spawnStar(); }
        for (let i = stars.length - 1; i >= 0; i--) {
          const st = stars[i];
          const dx = Math.cos(st.ang), dy = Math.sin(st.ang);
          st.x += dx * st.spd;
          st.y += dy * st.spd;
          st.life -= 0.02;
          drawStar(st);
          if (st.life <= 0 || st.x > W + 400 * DPR || st.y > H + 400 * DPR) stars.splice(i, 1);
        }
      }
      requestAnimationFrame(animateBG);
    }

    const droplets = [];
    const MAX_DROPLETS = 90;
    const SPAWN_EVERY_MS = 22;
    let lastSpawn = 0;
    function spawnDroplet(x, y) {
      if (droplets.length >= MAX_DROPLETS) droplets.shift();
      droplets.push({
        x: x * DPR, y: y * DPR,
        r: (8 + Math.random() * 10) * DPR,
        vy: (-0.24 - Math.random() * 0.34) * DPR,
        life: 1, decay: 0.02 + Math.random() * 0.02
      });
    }
    window.addEventListener("mousemove", (e) => {
      const now = performance.now();
      if (now - lastSpawn < SPAWN_EVERY_MS) return;
      lastSpawn = now;
      if ((document.body.getAttribute("data-theme") || "aqua") === "aqua") {
        spawnDroplet(e.clientX, e.clientY);
      }
    }, { passive: true });

    function drawDroplets() {
      ctx.clearRect(0, 0, W, H);
      if ((document.body.getAttribute("data-theme") || "aqua") !== "aqua") {
        requestAnimationFrame(drawDroplets);
        return;
      }
      for (let i = droplets.length - 1; i >= 0; i--) {
        const d = droplets[i];
        d.life -= d.decay;
        d.y += d.vy;
        if (d.life <= 0) { droplets.splice(i, 1); continue; }
        const a = Math.max(0, d.life);
        ctx.globalAlpha = a * 0.62;
        ctx.beginPath();
        ctx.fillStyle = "rgba(110,231,255,0.38)";
        ctx.arc(d.x, d.y, d.r * 1.10, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
      requestAnimationFrame(drawDroplets);
    }

    // ===== INIT =====
    document.addEventListener("DOMContentLoaded", async () => {
      const ok = await checkHealth();
      if (!ok) return;
      window.SC_OK = true;

      const savedTheme = localStorage.getItem(STORAGE_KEY_THEME);
      setTheme(savedTheme === "dark" ? "dark" : "aqua");

      const st = localStorage.getItem(STORAGE_KEY_STATS);
      statsToggle.checked = (st === "1");

      playedMap = loadJsonLS(STORAGE_KEY_PLAYEDMAP, {}) || {};
      stations = loadJsonLS(STORAGE_KEY_STATIONS, []);
      if (!Array.isArray(stations)) stations = [];

      // Restore persisted filter/station selections
      const savedGenre = localStorage.getItem(STORAGE_KEY_GENRE);
      if (savedGenre) genreSelect.value = savedGenre;
      const savedSource = localStorage.getItem(STORAGE_KEY_SOURCE);
      if (savedSource) sourceSelect.value = savedSource;
      const savedRange = localStorage.getItem(STORAGE_KEY_RANGE);
      if (savedRange) obscureRange.value = savedRange;

      const savedStation = localStorage.getItem(STORAGE_KEY_STATION);
      stationId = (savedStation && stations.some(s => s.id === savedStation)) ? savedStation : "__all__";
      renderStationsSelect();

      const fromDb = await idbGet(STORAGE_KEY_LIBRARY);
      if (Array.isArray(fromDb) && fromDb.length) {
        library = fromDb;
      } else {
        library = [...SEED_LIBRARY];
        await idbSet(STORAGE_KEY_LIBRARY, library);
      }

      crate = loadJsonLS(STORAGE_KEY_CRATE, []);
      if (!Array.isArray(crate)) crate = [];
      history = loadJsonLS(STORAGE_KEY_HISTORY, []);
      if (!Array.isArray(history)) history = [];

      renderList(crateList, crate, "crate");
      renderList(historyList, history, "history");

      resetContext();

      playerFrame.src = buildEmbedUrl(SEED_LIBRARY[0].url);
      ensureWidget();

      try {
        const raw = localStorage.getItem(STORAGE_KEY_LAST);
        if (raw) {
          const last = JSON.parse(raw);
          if (last && last.url) {
            loadItem(last, false);
          }
        }
      } catch { }

      resizeAll();
      requestAnimationFrame(animateBG);
      requestAnimationFrame(drawDroplets);

      setStatus("READY");
      await doShuffle(false);
    });
  </script>
</body>
